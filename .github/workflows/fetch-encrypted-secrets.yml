name: Fetch Encrypted Secrets

on:
  workflow_call:
    inputs:
      zip_url_json:
        required: true
        type: string

permissions:
  contents: read

jobs:
  download-zip:
    runs-on: ubuntu-latest
    steps:
      - name: Download encrypted secrets zip
        shell: bash
        run: |
          python - <<'PY'
          import json
          import time
          import zipfile
          import io
          from urllib.parse import urlencode
          from urllib.request import Request, urlopen

          input_data = json.loads(r'''${{ inputs.zip_url_json }}''')
          base_url = str(input_data['url']).rstrip('/')
          filename = input_data['file']
          url = f"{base_url}/get_zip?{urlencode({'filename': filename})}"
          last_error = None

          for attempt in range(10):
              try:
                  print(f"Downloading encrypted secrets zip (attempt {attempt + 1}/10) from {base_url}/get_zip")
                  req = Request(url, headers={"User-Agent": "rdgen-github-actions"})
                  with urlopen(req, timeout=45) as response:
                      content = response.read()
                      status = response.status
                      content_type = response.headers.get("content-type", "")
                  if len(content) < 64:
                      raise RuntimeError(f"Downloaded file is too small ({len(content)} bytes)")
                  if not zipfile.is_zipfile(io.BytesIO(content)):
                      preview = content[:200].decode("utf-8", "replace").replace('\n', ' ')
                      raise RuntimeError(f"Downloaded response is not a zip file. HTTP {status}. Content-Type {content_type}. Preview: {preview}")
                  with open('secrets.zip', 'wb') as f:
                      f.write(content)
                  print(f"Downloaded secrets.zip ({len(content)} bytes)")
                  break
              except Exception as e:
                  last_error = e
                  if attempt < 9:
                      wait_seconds = min(60, 5 * (2 ** attempt))
                      print(f"Download failed: {e}. Waiting {wait_seconds}s before retry.")
                      time.sleep(wait_seconds)
                  else:
                      raise RuntimeError(f"Unable to download encrypted secrets zip after 10 attempts: {last_error}") from e
          PY

      - name: Upload Encrypted Artifact
        uses: actions/upload-artifact@v4
        with:
          name: encrypted-secrets-zip
          path: secrets.zip
          retention-days: 1
